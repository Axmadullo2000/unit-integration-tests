# Test Database Configuration
# Uses the same PostgreSQL but you can create a separate test database
spring.datasource.url=jdbc:postgresql://localhost:5432/booking_db_test
spring.datasource.username=postgres
spring.datasource.password=2001
spring.datasource.driver-class-name=org.postgresql.Driver

# Schema initialization for tests
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# JWT Configuration (shorter expiration for tests)
jwt.secret=test-secret-key-must-be-at-least-32-characters-long-for-tests
jwt.access-token-expiration=60000
jwt.refresh-token-expiration=300000

# Logging for tests
logging.level.interview.prep.unittests=DEBUG
logging.level.org.springframework.security=DEBUG
